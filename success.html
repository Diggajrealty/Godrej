  <style>
    :root {
      --clr-primary:    #1B3A2D;
      --clr-accent:     #C9A84C;
      --clr-bg:         #F5F0E8;
      --clr-text:       #1A1A1A;
      --clr-text-muted: #5a5a5a;
      --font-heading:   'Playfair Display', Georgia, serif;
      --font-body:      'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--clr-bg);
      color: var(--clr-text);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .success-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, rgba(27, 58, 45, 0.05) 0%, rgba(201, 168, 76, 0.05) 100%);
    }

    .success-card {
      background: #fff;
      padding: 4rem 3rem;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(27, 58, 45, 0.08);
      max-width: 600px;
      width: 100%;
      text-align: center;
      border-top: 4px solid var(--clr-accent);
    }

    .success-icon {
      width: 80px;
      height: 80px;
      background: rgba(201, 168, 76, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      color: var(--clr-primary);
    }

    .success-icon svg {
      width: 40px;
      height: 40px;
      fill: currentColor;
    }

    .success-title {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      color: var(--clr-primary);
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .success-desc {
      font-size: 1.05rem;
      color: var(--clr-text-muted);
      margin-bottom: 2.5rem;
    }

    .btn-gold {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--clr-accent);
      color: var(--clr-primary);
      font-weight: 700;
      font-size: 1rem;
      padding: 1rem 2.5rem;
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.3s ease;
      letter-spacing: 0.04em;
    }

    .btn-gold:hover {
      background: var(--clr-primary);
      color: var(--clr-accent);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(27, 58, 45, 0.15);
    }

    @media (max-width: 600px) {
      .success-card {
        padding: 3rem 1.5rem;
      }
      .success-title {
        font-size: 2rem;
      }
    }
  </style>
</head>

      <a href="index.html" class="btn-gold">
        ← Back to Home
      </a>
    </div>
  </div>

</body>
